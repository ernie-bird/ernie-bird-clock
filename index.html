<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clock</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000814;
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      touch-action: manipulation;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000814;
    }
    #controls {
      position: fixed;
      top: 8px;
      left: 10px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
    }
    #controls button {
      background: rgba(0,0,0,0.25);
      color: #cfd8e3;
      border: 1px solid rgba(180,200,220,0.35);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      backdrop-filter: blur(2px);
    }
    #controls button:hover {
      background: rgba(255,255,255,0.06);
    }
    #tapHint {
      color: #a8b3c7;
      user-select: none;
      white-space: nowrap;
    }
    #tapHint.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button id="muteBtn">Mute (m)</button>
    <button id="exitBtn">Exit (esc)</button>
    <span id="tapHint">tap anywhere for sound</span>
  </div>

  <canvas id="screen"></canvas>
<script>
(() => {
  const canvas = document.getElementById("screen");
  const ctx = canvas.getContext("2d");

  const muteBtn = document.getElementById("muteBtn");
  const exitBtn = document.getElementById("exitBtn");
  const tapHint = document.getElementById("tapHint");

  let W = 0, H = 0, DPR = Math.max(1, window.devicePixelRatio || 1);
  let cellW = 12, cellH = 20, cols = 80, rows = 30;

  const BACKGROUND = "#000814";
  const VISUAL_Y_SCALE = 1.0;

  let muted = false;
  let lastError = null;

  const TICK_MS = 125;
  let lastFrameTime = performance.now();
  let accumulator = 0;

  const GLITTER_HZ = 24;
  const GLITTER_TICK_MS = 1000 / GLITTER_HZ;
  let glitterAccumulator = 0;

  let GLITTER_CELL_W = 6;
  let GLITTER_CELL_H = 8;

  let exitOverlay = false;
  let exitCountdown = 10.0;

  let audioCtx = null;
  let audioReady = false;
  let masterGain = null;
  let ambientGain = null;
  let ambientOscA = null;
  let ambientOscB = null;

  let lastTriangleBeep = 0;
  let lastCircleBeep = 0;
  let lastGlitterBeep = 0;
  let lastFreezeBeep = 0;

  let freezeUntil = 0;
  let frozenClockDate = null;
  let nextFreezeAt = performance.now() + 12000 + Math.random() * 18000;
  let freezeBurstTriggered = false;
  let freezeBurstDecayUntil = 0;

  let pointerIsDown = false;
  let lastPointerSpawn = 0;
  let pointerX = 0;
  let pointerY = 0;
  let pointerDownAt = 0;
  let lastPointerMoveAt = 0;
  let pointerMovedRecentlyUntil = 0;
  let pointerPrevX = 0;
  let pointerPrevY = 0;

  let holdOsc = null;
  let holdGain = null;
  let holdFilter = null;
  let holdLfo = null;
  let holdLfoGain = null;
  let holdTargetFreq = 1200;
  let holdCurrentFreq = 1200;

  const glitterParticles = [];
  const secondTrail = [];
  const messages = [];
  const triangles = [];
  const messageCooldowns = new Map();

  const MESSAGE_REPEAT_COOLDOWN_MS = 18000;
  const MAX_OVERLAP_MS = 300;
  const MAX_VISIBLE_MESSAGES = 2;
  const PREFER_SINGLE_MESSAGE_CHANCE = 0.82;

  const LIGHT_TEXT = ["#f7f9fb", "#f5f7fa", "#eef2f7", "#ffffff", "#f0f8ff", "#fff7d6", "#dff6ff", "#e8f1ff"];
  const SPARKLE = ["#ffffff", "#fff8cc", "#ffe066", "#9bf6ff", "#bdb2ff", "#a0e7e5", "#f1fa8c"];
  const BLUE_MSG = ["#7dd3fc", "#67e8f9", "#93c5fd", "#a5f3fc", "#bfdbfe", "#c4b5fd"];
  const WAKE_MSG = ["#ffffff", "#f8fafc", "#fde68a", "#fef3c7", "#d1fae5", "#e9d5ff", "#fbcfe8"];
  const CLOCK_WHITE = ["#ffffff", "#fcfcfc", "#fafafa", "#f7f7f7", "#f4f4f4", "#f1f1f1"];
  const FREEZE_BURST_COLORS = [
    "#ffffff", "#ffd6ff", "#caffbf", "#9bf6ff", "#fdffb6", "#bdb2ff",
    "#ffc6ff", "#ffadad", "#a0c4ff", "#ffef9f", "#c1fba4", "#f4bfff",
    "#ff99c8", "#b9fbc0", "#bde0fe", "#ffea00", "#00f5d4", "#f15bb5",
    "#fee440", "#00bbf9", "#f72585", "#7209b7"
  ];
  const FREEZE_BURST_GLYPHS = ["✦", "✧", "✹", "✺", "✷", "✶", "*", "+", "※", "❋", "◌", "◉", "◍", "░", "▒", "◆", "◇", "◈", "▣"];

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function isFrozenNow(now = performance.now()) {
    return freezeUntil > now;
  }

  function pointerIsDragging(now = performance.now()) {
    return pointerIsDown && now < pointerMovedRecentlyUntil;
  }

  function pointerIsHolding(now = performance.now()) {
    return pointerIsDown && !pointerIsDragging(now);
  }

  function pickMessageWithCooldown(options, nowMs) {
    const available = options.filter(text => (messageCooldowns.get(text) || 0) <= nowMs);
    const chosen = pick(available.length ? available : options);
    messageCooldowns.set(chosen, nowMs + MESSAGE_REPEAT_COOLDOWN_MS + Math.random() * 6000);
    return chosen;
  }

  function lightMessageColor(kind = "wake") {
    return kind === "blue" ? pick(BLUE_MSG) : pick(WAKE_MSG);
  }

  function pickClockWhite() {
    const r = Math.random();
    if (r < 0.010) return "#e9e9e9";
    if (r < 0.040) return "#f2f2f2";
    return pick(CLOCK_WHITE);
  }

  function updateButtons() {
    muteBtn.textContent = muted ? "Unmute (m)" : "Mute (m)";
  }

  function markAudioReady() {
    if (!audioReady) {
      audioReady = true;
      tapHint.classList.add("hidden");
    }
  }

  function createMasterGain() {
    if (!audioCtx || masterGain) return;

    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 0.9;
    masterGain.connect(audioCtx.destination);

    ambientGain = audioCtx.createGain();
    ambientGain.gain.value = 0.0001;
    ambientGain.connect(masterGain);
  }

  function startAmbient() {
    if (!audioCtx || !ambientGain) return;
    if (ambientOscA || ambientOscB) return;

    const now = audioCtx.currentTime;

    ambientOscA = audioCtx.createOscillator();
    ambientOscB = audioCtx.createOscillator();

    const lp = audioCtx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 850;

    ambientOscA.type = "triangle";
    ambientOscB.type = "sine";

    ambientOscA.frequency.setValueAtTime(66, now);
    ambientOscB.frequency.setValueAtTime(91, now);

    ambientOscA.connect(lp);
    ambientOscB.connect(lp);
    lp.connect(ambientGain);

    ambientOscA.start(now);
    ambientOscB.start(now);

    ambientGain.gain.cancelScheduledValues(now);
    ambientGain.gain.setValueAtTime(0.0001, now);
    ambientGain.gain.exponentialRampToValueAtTime(0.012, now + 1.2);
  }

  async function ensureAudio() {
    try {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === "suspended") {
        await audioCtx.resume();
      }
      if (audioCtx && audioCtx.state === "running") {
        createMasterGain();
        startAmbient();
        markAudioReady();
      }
    } catch (e) {
      console.warn("Audio init/resume failed:", e);
    }
  }

  function setMuteState(nextMuted) {
    muted = nextMuted;
    updateButtons();

    if (masterGain && audioCtx) {
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(muted ? 0.0 : 0.9, now + 0.06);
    }
  }

  function playTone(freq = 440, duration = 0.05, volume = 0.03, type = "sine") {
    if (muted) return;
    if (!audioCtx || audioCtx.state !== "running" || !masterGain) return;

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(volume, now + 0.004);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + duration + 0.01);
  }

  function ensureHoldTone() {
    if (muted) return;
    if (!audioCtx || audioCtx.state !== "running" || !masterGain) return;
    if (holdOsc) return;

    const now = audioCtx.currentTime;

    holdOsc = audioCtx.createOscillator();
    holdGain = audioCtx.createGain();
    holdFilter = audioCtx.createBiquadFilter();
    holdLfo = audioCtx.createOscillator();
    holdLfoGain = audioCtx.createGain();

    holdOsc.type = "triangle";
    holdOsc.frequency.setValueAtTime(holdCurrentFreq, now);

    holdFilter.type = "highpass";
    holdFilter.frequency.setValueAtTime(1200, now);

    holdLfo.type = "sine";
    holdLfo.frequency.setValueAtTime(4.5, now);
    holdLfoGain.gain.setValueAtTime(10, now);

    holdLfo.connect(holdLfoGain);
    holdLfoGain.connect(holdOsc.frequency);

    holdGain.gain.setValueAtTime(0.0001, now);
    holdGain.gain.exponentialRampToValueAtTime(0.006, now + 0.04);

    holdOsc.connect(holdFilter);
    holdFilter.connect(holdGain);
    holdGain.connect(masterGain);

    holdOsc.start(now);
    holdLfo.start(now);
  }

  function stopHoldTone() {
    if (!holdOsc || !audioCtx) return;
    const now = audioCtx.currentTime;
    try {
      holdGain.gain.cancelScheduledValues(now);
      holdGain.gain.setValueAtTime(Math.max(0.0001, holdGain.gain.value), now);
      holdGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      holdOsc.stop(now + 0.1);
      holdLfo.stop(now + 0.1);
    } catch (_) {}
    holdOsc = null;
    holdGain = null;
    holdFilter = null;
    holdLfo = null;
    holdLfoGain = null;
    holdCurrentFreq = 1200;
    holdTargetFreq = 1200;
  }

  function updateHoldTone(nowMs, dtMs) {
    if (!pointerIsDown || muted || !audioCtx || audioCtx.state !== "running" || !masterGain) {
      stopHoldTone();
      return;
    }

    ensureHoldTone();
    if (!holdOsc || !holdGain || !holdFilter || !holdLfo || !holdLfoGain) return;

    const frozen = isFrozenNow(nowMs);
    const dragging = pointerIsDragging(nowMs);
    const heldMs = nowMs - pointerDownAt;

    let baseFreq;
    let gainTarget;
    let filterTarget;
    let lfoFreq;
    let lfoDepth;

    if (frozen) {
      baseFreq = 2000 + 1200 * Math.sin(nowMs * 0.018) + 850 * Math.sin(nowMs * 0.052 + 0.8);
      gainTarget = 0.024;
      filterTarget = 4600;
      lfoFreq = 18 + 8 * Math.sin(nowMs * 0.004);
      lfoDepth = 180 + 140 * Math.sin(nowMs * 0.009);
    } else if (dragging) {
      baseFreq = 1180 + 120 * Math.sin(nowMs * 0.010);
      gainTarget = 0.0055;
      filterTarget = 1650;
      lfoFreq = 5.3;
      lfoDepth = 10;
    } else {
      const climb = Math.min(1, heldMs / 1800);
      baseFreq = 1160 + climb * 820 + 40 * Math.sin(nowMs * 0.009);
      gainTarget = 0.005 + climb * 0.0045;
      filterTarget = 1550 + climb * 1050;
      lfoFreq = 6 + climb * 6;
      lfoDepth = 10 + climb * 22;
    }

    holdTargetFreq = baseFreq;
    holdCurrentFreq += (holdTargetFreq - holdCurrentFreq) * Math.min(1, dtMs * 0.010);

    const t = audioCtx.currentTime;

    holdOsc.frequency.cancelScheduledValues(t);
    holdOsc.frequency.setTargetAtTime(Math.max(120, holdCurrentFreq), t, 0.03);

    holdFilter.frequency.cancelScheduledValues(t);
    holdFilter.frequency.setTargetAtTime(filterTarget, t, 0.03);

    holdGain.gain.cancelScheduledValues(t);
    holdGain.gain.setTargetAtTime(gainTarget, t, 0.03);

    holdLfo.frequency.cancelScheduledValues(t);
    holdLfo.frequency.setTargetAtTime(lfoFreq, t, 0.03);

    holdLfoGain.gain.cancelScheduledValues(t);
    holdLfoGain.gain.setTargetAtTime(lfoDepth, t, 0.03);
  }

  function beepTriangle() {
    const t = performance.now();
    if (t - lastTriangleBeep < 50) return;
    lastTriangleBeep = t;
    playTone(880, 0.045, 0.025, "sine");
  }

  function beepCircle() {
    const t = performance.now();
    if (t - lastCircleBeep < 40) return;
    lastCircleBeep = t;
    playTone(540, 0.05, 0.02, "sine");
  }

  function beepGlitter() {
    const t = performance.now();
    if (t - lastGlitterBeep < 24) return;
    lastGlitterBeep = t;

    if (muted) return;
    if (!audioCtx || audioCtx.state !== "running" || !masterGain) return;

    const frozen = isFrozenNow(t);
    const dragging = pointerIsDragging(t);
    const holding = pointerIsHolding(t);
    const heldMs = t - pointerDownAt;
    const holdClimb = Math.min(1, Math.max(0, heldMs) / 1800);

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = "triangle";
    filter.type = "highpass";

    if (frozen) {
      osc.frequency.setValueAtTime(2100 + Math.random() * 1100, now);
      osc.frequency.linearRampToValueAtTime(4200 + Math.random() * 2600, now + 0.03);
      osc.frequency.linearRampToValueAtTime(2600 + Math.random() * 2000, now + 0.16);

      filter.frequency.setValueAtTime(1800, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.045, now + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
    } else if (holding) {
      const startF = 1180 + holdClimb * 380 + Math.random() * 50;
      const endF = 1680 + holdClimb * 760 + Math.random() * 110;

      osc.frequency.setValueAtTime(startF, now);
      osc.frequency.linearRampToValueAtTime(endF, now + 0.07);

      filter.frequency.setValueAtTime(1200 + holdClimb * 700, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.010 + holdClimb * 0.005, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
    } else if (dragging) {
      osc.frequency.setValueAtTime(1350 + Math.random() * 500, now);
      osc.frequency.exponentialRampToValueAtTime(2200 + Math.random() * 800, now + 0.07);

      filter.frequency.setValueAtTime(1200, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.02, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
    } else {
      osc.frequency.setValueAtTime(1400 + Math.random() * 800, now);
      osc.frequency.exponentialRampToValueAtTime(2200 + Math.random() * 1200, now + 0.08);

      filter.frequency.setValueAtTime(1200, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.02, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
    }

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);

    osc.start(now);
    osc.stop(now + 0.22);
  }

  function beepFreeze() {
    const t = performance.now();
    if (t - lastFreezeBeep < 500) return;
    lastFreezeBeep = t;

    if (muted) return;
    if (!audioCtx || audioCtx.state !== "running" || !masterGain) return;

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(420, now);
    osc.frequency.exponentialRampToValueAtTime(160, now + 0.18);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.03, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start(now);
    osc.stop(now + 0.22);
  }

  function beepFreezeBurst() {
    if (muted) return;
    if (!audioCtx || audioCtx.state !== "running" || !masterGain) return;

    const now = audioCtx.currentTime;

    for (let i = 0; i < 6; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = i % 2 === 0 ? "triangle" : "sine";

      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();

      const start = now + i * 0.010;
      const base = 1600 + i * 340 + Math.random() * 350;
      const peak = 4600 + i * 650 + Math.random() * 1800;
      const settle = 2900 + i * 280 + Math.random() * 1000;

      osc.frequency.setValueAtTime(base, start);
      osc.frequency.linearRampToValueAtTime(peak, start + 0.038);
      osc.frequency.linearRampToValueAtTime(settle, start + 0.22);

      lfo.type = "sine";
      lfo.frequency.setValueAtTime(20 + i * 3.4, start);
      lfoGain.gain.setValueAtTime(180 + i * 45, start);

      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.038, start + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.34);

      osc.connect(gain);
      gain.connect(masterGain);

      osc.start(start);
      lfo.start(start);
      osc.stop(start + 0.36);
      lfo.stop(start + 0.36);
    }
  }

  function currentFreezeBurstStrength(nowMs = performance.now()) {
    if (freezeBurstDecayUntil <= nowMs) return 0;
    return Math.max(0, (freezeBurstDecayUntil - nowMs) / 15000);
  }

  function spawnGlitterBurst(px, py, opts = {}) {
    const {
      intensity = 1,
      concentrated = false,
      explosive = false
    } = opts;

    const sx = snapGlitterX(px);
    const sy = snapGlitterY(py);

    const count = explosive
      ? Math.floor(420 + Math.random() * 420 * intensity)
      : concentrated
        ? Math.floor(10 + Math.random() * 8 * intensity)
        : Math.floor(16 + Math.random() * 14 * intensity);

    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      let speedMin, speedMax, driftOffset, maxLife, colorSet, glyphs;

      if (explosive) {
        speedMin = 0.35;
        speedMax = 2.2;
        driftOffset = 2.1;
        maxLife = 8.0 + Math.random() * 7.0;
        colorSet = FREEZE_BURST_COLORS;
        glyphs = FREEZE_BURST_GLYPHS;
      } else if (concentrated) {
        speedMin = 0.03;
        speedMax = 0.28;
        driftOffset = 0.10;
        maxLife = 1.4 + Math.random() * 1.6;
        colorSet = ["#ffffff", "#fff8cc", "#fde68a", "#dbeafe"];
        glyphs = [".", ":", "·", "•", "+"];
      } else {
        speedMin = 0.18;
        speedMax = 1.1;
        driftOffset = 0.28;
        maxLife = 0.95 + Math.random() * 1.35;
        colorSet = ["#ffffff", "#f8fafc", "#fde68a", "#fbcfe8", "#dbeafe", "#e9d5ff", "#fff8cc"];
        glyphs = [".", ":", "+", "*", "·", "•", "░", "▒", "✦", "✧"];
      }

      const speed = speedMin + Math.random() * speedMax;
      glitterParticles.push({
        x: sx + (Math.random() - 0.5) * GLITTER_CELL_W * driftOffset,
        y: sy + (Math.random() - 0.5) * GLITTER_CELL_H * driftOffset,
        gx: sx,
        gy: sy,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed,
        life: maxLife,
        maxLife,
        glyph: pick(glyphs),
        color: pick(colorSet),
        blinkOffset: Math.random() * Math.PI * 2,
        bursty: explosive,
        bounce: explosive
      });
    }

    beepGlitter();
  }

  function triggerFreezeTouchBurst() {
    const nowMs = performance.now();
    freezeBurstTriggered = true;
    freezeBurstDecayUntil = nowMs + 15000;

    spawnGlitterBurst(pointerX, pointerY, { intensity: 2.8, explosive: true });
    spawnGlitterBurst(pointerX, pointerY, { intensity: 2.5, explosive: true });
    spawnGlitterBurst(pointerX, pointerY, { intensity: 2.2, explosive: true });
    spawnGlitterBurst(pointerX, pointerY, { intensity: 1.9, explosive: true });

    beepFreezeBurst();
  }

  function updateGlitter(dtMs) {
    const dt = dtMs / 1000;
    const nowMs = performance.now();
    const burstStrength = currentFreezeBurstStrength(nowMs);

    for (let i = glitterParticles.length - 1; i >= 0; i--) {
      const p = glitterParticles[i];
      p.life -= dt;

      if (p.life <= 0) {
        glitterParticles.splice(i, 1);
        continue;
      }

      const friction = p.bursty ? 0.994 : 0.972;
      p.vx *= friction;
      p.vy *= friction;

      p.vy += (p.bursty ? 0.004 : 0.045) * dt;

      const moveScale = p.bursty ? 0.95 : 0.55;
      p.x += p.vx * GLITTER_CELL_W * moveScale;
      p.y += p.vy * GLITTER_CELL_H * moveScale;

      if (p.bursty) {
        const minX = 0;
        const minY = 0;
        const maxX = Math.max(0, W - GLITTER_CELL_W);
        const maxY = Math.max(0, H - GLITTER_CELL_H);

        if (p.x < minX) {
          p.x = minX;
          p.vx = Math.abs(p.vx);
        } else if (p.x > maxX) {
          p.x = maxX;
          p.vx = -Math.abs(p.vx);
        }

        if (p.y < minY) {
          p.y = minY;
          p.vy = Math.abs(p.vy);
        } else if (p.y > maxY) {
          p.y = maxY;
          p.vy = -Math.abs(p.vy);
        }
      }

      if (burstStrength > 0.05 && p.bursty) {
        p.x += Math.sin(nowMs * 0.022 + p.blinkOffset) * (0.55 + burstStrength * 0.65);
        p.y += Math.cos(nowMs * 0.016 + p.blinkOffset) * (0.55 + burstStrength * 0.65);
      }

      p.gx = snapGlitterX(p.x);
      p.gy = snapGlitterY(p.y);
    }
  }

  function maybeTriggerFreeze(nowMs) {
    if (exitOverlay) return;
    if (freezeUntil > nowMs) return;

    if (nowMs >= nextFreezeAt) {
      freezeUntil = nowMs + 1000;
      frozenClockDate = new Date();
      nextFreezeAt = nowMs + 12000 + Math.random() * 24000;
      freezeBurstTriggered = false;
      beepFreeze();

      if (pointerIsDown) {
        triggerFreezeTouchBurst();
      }
    }
  }

  function updateSimulationTick(clockNow = null) {
    if (exitOverlay) {
      exitCountdown -= TICK_MS / 1000;
      if (exitCountdown <= 0) {
        exitOverlay = false;
        exitCountdown = 10.0;
      }
      return;
    }

    updateMessagesTick();

    const now = clockNow || new Date();
    const cx = Math.floor(cols / 2);
    const cy = Math.floor(rows / 2);
    const radiusPx = Math.max(
      40,
      Math.min((cols - 12) * cellW / 2, (rows - 8) * cellH / 2)
    );

    const sec = now.getSeconds() + now.getMilliseconds() / 1000;
    const secA = sec / 60 * 2 * Math.PI - Math.PI / 2;

    const tipX = Math.floor(cx + (Math.cos(secA) * radiusPx) / cellW);
    const tipY = Math.floor(cy + (Math.sin(secA) * radiusPx) / cellH);
    secondTrail.push([tipX, tipY]);
    while (secondTrail.length > 5) secondTrail.shift();

    updateTriangles(cols, rows, cx, cy, radiusPx);
  }

  function renderClock(forcedNow = null) {
    resetGrid();

    const now = forcedNow || new Date();
    const cx = Math.floor(cols / 2);
    const cy = Math.floor(rows / 2);
    const radiusPx = Math.max(
      40,
      Math.min((cols - 12) * cellW / 2, (rows - 8) * cellH / 2)
    );

    const sec = now.getSeconds() + now.getMilliseconds() / 1000;
    const minute = now.getMinutes() + sec / 60;
    const hour = (now.getHours() % 12) + minute / 60;

    const secA = sec / 60 * 2 * Math.PI - Math.PI / 2;
    const minA = minute / 60 * 2 * Math.PI - Math.PI / 2;
    const hourA = hour / 12 * 2 * Math.PI - Math.PI / 2;

    const circleColor = pickClockWhite();
    const minuteColor = pickClockWhite();
    const hourColor = pickClockWhite();

    const hourLenPx = radiusPx * 0.50;
    const minuteLenPx = radiusPx * 0.84;
    const secondLenPx = radiusPx * 1.08;

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const dxPx = (x - cx) * cellW;
        const dyPx = (y - cy) * cellH * VISUAL_Y_SCALE;
        const distPx = Math.sqrt(dxPx * dxPx + dyPx * dyPx);
        const ang = Math.atan2(dyPx, dxPx);

        if (Math.abs(distPx - radiusPx) < Math.max(cellW, cellH) * 0.45) {
          put(y, x, "o", circleColor);
        }
        if (distPx < hourLenPx && angleDiff(ang, hourA) < 0.13) {
          put(y, x, "#", hourColor);
        }
        if (distPx < minuteLenPx && angleDiff(ang, minA) < 0.09) {
          put(y, x, "|", minuteColor);
        }
        if (distPx < secondLenPx && angleDiff(ang, secA) < 0.08) {
          put(y, x, pick(["*", "+", "•", "✦", "✧", "."]), pick(SPARKLE));
        }
      }
    }

    for (let i = 0; i < secondTrail.length; i++) {
      const [tx, ty] = secondTrail[i];
      for (let dx = -1; dx <= 1; dx++) {
        put(ty, tx + dx, pick(["·", "•", ".", "⋆"]), ["#ffffff", "#f5f5f5", "#e5e5e5", "#d4d4d4", "#c4c4c4"][i] || "#ffffff");
      }
    }

    put(cy, cx, "●", "#ff4d4d");

    for (const t of triangles) {
      put(t.y, t.x, t.glyph, pick(["#ffd166", "#f8fafc", "#dbeafe", "#e9d5ff", "#fbcfe8"]));
    }

    for (const msg of messages) {
      if (msg.size === 1) drawText(msg.row, msg.col, msg.text, msg.color);
      else renderBitmapLines(msg.lines, msg.size, msg.row, msg.col, msg.color);
    }

    renderGrid();
  }

  function frame(now) {
    try {
      const dt = now - lastFrameTime;
      lastFrameTime = now;

      maybeTriggerFreeze(now);
      updateHoldTone(now, dt);

      if (pointerIsDown) {
        while (now - lastPointerSpawn >= GLITTER_TICK_MS) {
          lastPointerSpawn += GLITTER_TICK_MS;
          spawnPointerGlitter(lastPointerSpawn);
        }
      }

      glitterAccumulator += dt;
      while (glitterAccumulator >= GLITTER_TICK_MS) {
        updateGlitter(GLITTER_TICK_MS);
        glitterAccumulator -= GLITTER_TICK_MS;
      }

      const frozen = freezeUntil > now;

      if (!frozen) {
        accumulator += dt;
        while (accumulator >= TICK_MS) {
          updateSimulationTick();
          accumulator -= TICK_MS;
        }
      }

      if (exitOverlay) {
        drawExitOverlay();
      } else {
        renderClock(frozen ? frozenClockDate : null);
      }

      renderGlitter();

      if (!frozen && freezeUntil <= now) {
        frozenClockDate = null;
      }

      requestAnimationFrame(frame);
    } catch (err) {
      lastError = err;
      console.error(err);
      drawErrorOverlay(err);
    }
  }

  function triggerExitOverlay() {
    ensureAudio();
    exitOverlay = true;
    exitCountdown = 10.0;
  }

  function pointerEventPos(e) {
    return { x: e.clientX, y: e.clientY };
  }

  function spawnPointerGlitter(nowMs) {
    const frozen = isFrozenNow(nowMs);
    const dragging = pointerIsDragging(nowMs);
    const holding = pointerIsHolding(nowMs);

    if (frozen && pointerIsDown && !freezeBurstTriggered) {
      triggerFreezeTouchBurst();
    }

    if (frozen) {
      spawnGlitterBurst(pointerX, pointerY, {
        intensity: 1.0,
        concentrated: false
      });
      return;
    }

    if (holding) {
      spawnGlitterBurst(pointerX, pointerY, {
        intensity: 0.70,
        concentrated: true
      });
    } else if (dragging) {
      spawnGlitterBurst(pointerX, pointerY, {
        intensity: 0.42,
        concentrated: false
      });
    } else {
      spawnGlitterBurst(pointerX, pointerY, {
        intensity: 0.55,
        concentrated: true
      });
    }
  }

  function handlePointerDown(e) {
    ensureAudio();
    pointerIsDown = true;

    const p = pointerEventPos(e);
    pointerX = p.x;
    pointerY = p.y;
    pointerPrevX = p.x;
    pointerPrevY = p.y;

    const nowMs = performance.now();
    pointerDownAt = nowMs;
    lastPointerSpawn = nowMs;
    lastPointerMoveAt = nowMs;
    pointerMovedRecentlyUntil = 0;

    if (isFrozenNow(nowMs)) {
      if (!freezeBurstTriggered) triggerFreezeTouchBurst();
      spawnGlitterBurst(pointerX, pointerY, { intensity: 1.2, concentrated: false });
    } else {
      spawnGlitterBurst(pointerX, pointerY, { intensity: 0.95, concentrated: true });
    }
  }

  function handlePointerMove(e) {
    const p = pointerEventPos(e);
    pointerX = p.x;
    pointerY = p.y;

    const nowMs = performance.now();
    const dx = pointerX - pointerPrevX;
    const dy = pointerY - pointerPrevY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 1.2) {
      lastPointerMoveAt = nowMs;
      pointerMovedRecentlyUntil = nowMs + 140;
    }

    pointerPrevX = pointerX;
    pointerPrevY = pointerY;

    if (!pointerIsDown) return;

    if (isFrozenNow(nowMs) && !freezeBurstTriggered) {
      triggerFreezeTouchBurst();
    }
  }

  function handlePointerUp() {
    pointerIsDown = false;
    pointerMovedRecentlyUntil = 0;
    stopHoldTone();
  }

  muteBtn.addEventListener("pointerdown", ensureAudio);
  exitBtn.addEventListener("pointerdown", ensureAudio);

  muteBtn.addEventListener("click", () => {
    setMuteState(!muted);
  });

  exitBtn.addEventListener("click", () => {
    triggerExitOverlay();
  });

  window.addEventListener("keydown", (e) => {
    ensureAudio();
    const k = e.key.toLowerCase();

    if (k === "m") {
      setMuteState(!muted);
    } else if (e.key === "Escape") {
      triggerExitOverlay();
    }
  });

  window.addEventListener("pointerdown", handlePointerDown);
  window.addEventListener("pointermove", handlePointerMove);
  window.addEventListener("pointerup", handlePointerUp);
  window.addEventListener("pointercancel", handlePointerUp);
  window.addEventListener("touchstart", ensureAudio, { passive: true });
  window.addEventListener("mousedown", ensureAudio);
  window.addEventListener("click", ensureAudio);

  initTriangles();
  updateButtons();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
